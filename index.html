<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sitio web oficial de Kamil's. Descubre nuestros servicios, proyectos y filosofía.">
    <title>Kamil's | Innovación y Diseño</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="blob-bg"></div>
    <div class="blob-bg blob-2"></div>
    
    <header class="glass-header">
        <nav class="nav-container">
            <div class="logo">Kamil's.</div>
            <ul class="nav-links">
                <li><a href="#inicio" id="link-inicio">Inicio</a></li>
                <li><a href="#servicios" id="link-servicios">Servicios</a></li>
                <li><a href="#contacto" id="link-contacto" class="btn-primary">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="inicio" class="hero-section">
            <div class="hero-content">
                <h1 class="hero-title">Elevando el <span class="gradient-text">Futuro</span> Digital</h1>
                <p class="hero-subtitle">Diseños premium, soluciones dinámicas y experiencias memorables para el mundo moderno.</p>
                <div class="hero-cta">
                    <a href="#servicios" class="btn-primary cta-btn" id="btn-explore">Explorar</a>
                    <a href="#contacto" class="btn-secondary cta-btn" id="btn-contact">Conócenos</a>
                </div>
            </div>
            <div class="hero-visual">
                <div class="glass-card mockup-card">
                    <div class="card-header">
                        <span class="dot red"></span>
                        <span class="dot yellow"></span>
                        <span class="dot green"></span>
                    </div>
                    <div class="card-body">
                        <h2>Bienvenido a Kamil's</h2>
                        <p>Visualizamos lo invisible.</p>
                        <div class="pulse-ring"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
